services:
  - type: web
    name: vendor-hub-backend
    runtime: node
    repo: https://github.com/Adam-Nugraha225/vendor-hub-backend
    plan: free
    region: singapore
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vendor-hub-db
          property: connectionString
      - key: JWT_SECRET
        value: super-secret-jwt-key-vendor-hub

databases:
  - name: vendor-hub-db
    plan: free
    region: singapore